<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
}

/* LAYER BACKGROUND */
#falling-layer{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:1;
  pointer-events:none;
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:999;
}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#ff758f,#ff8fa3);
  background-size:400% 400%;
  animation:bgMove 12s ease-in-out infinite;
  position:relative;
  z-index:2;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TEXT */
.text-box{
  background:rgba(0,0,0,0.6);
  padding:18px;
  border-radius:16px;
  max-width:85%;
  margin-bottom:20px;
  z-index:3;
}

.header-name{
  font-size:14px;
  opacity:0.8;
}

button{
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
  z-index:3;
}

/* FOTO SLOT */
#photo-slot{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

/* FOTO UTAMA */
.main-photo{
  width:190px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
  animation:floatPhoto 5s ease-in-out infinite;
}

@keyframes floatPhoto{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* FOTO JATUH */
.photo-fall{
  position:absolute;
  top:-100px;
  animation:fall linear;
  opacity:0.4;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* EMOJI */
.emoji-fall{
  position:absolute;
  top:-30px;
  animation:fall linear;
  opacity:0.5;
}

/* ENDING */
.focus-mode{
  filter:brightness(0.7);
  transition:1s;
}

/* BOUQUET */
.bouquet{
  position:fixed;
  left:50%;
  bottom:-100px;
  transform:translateX(-50%);
  width:110%;
  height:60vh;
  object-fit:contain;
  z-index:2;
  animation:fadeUp 1s ease, float 5s ease-in-out infinite;
}

@keyframes fadeUp{
  from{opacity:0; transform:translate(-50%,120px);}
  to{opacity:1; transform:translate(-50%,0);}
}

@keyframes float{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-12px);}
  100%{transform:translate(-50%,0);}
}

/* MEMORY */
.memory-main{
  width:90vw;
  max-width:380px;
  border-radius:18px;
  opacity:0;
  transition:0.8s ease;
}

.memory-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}
</style>
</head>

<body>

<div id="falling-layer"></div>

<div id="startScreen">
  <h2>just... take a moment 🥹</h2>
  <button onclick="startApp()">Tap to Start ✨</button>
</div>

<div id="main" class="container" style="display:none;">
  <div id="content"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const layer=document.getElementById("falling-layer");

let step=0, typing=false, fallInterval, emojiInterval;

const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"I’ve fallen for you... more than I planned 💖",
"aku serius sama perasaan ini",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg",
"kenangan4.jpg","kenangan5.jpg","kenangan6.jpg",
"kenangan7.jpg","kenangan8.jpg","kenangan9.jpg",
"kenangan10.jpg","kenangan11.jpg"
];

function startApp(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("main").style.display="flex";
  document.getElementById("lagu1").play().catch(()=>{});
  setTimeout(startStory,1500);
}

function startStory(){
  step=0;
  startFalling();
  startEmoji();
  next();
}

function typeText(t){
  typing=true;
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;
  let inter=setInterval(()=>{
    if(i<t.length){
      el.textContent+=t[i++];
    }else{
      clearInterval(inter);
      typing=false;
    }
  },35);
}

function next(){
  if(typing) return;
  step++;

  content.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p id="text"></p>
  </div>

  <div id="photo-slot"></div>

  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  let slot=document.getElementById("photo-slot");

  if(step===3){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.id="mainPhoto";
    img.className="main-photo";
    slot.appendChild(img);

    setTimeout(()=>{
      img.style.opacity=1;
      img.style.transform="translateY(0)";
    },900);
  }

  let photo=document.getElementById("mainPhoto");
  if(step>3 && photo){
    slot.appendChild(photo);
  }

  if(step===lines.length) showChoice();
}

function startFalling(){
  fallInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.width=(Math.random()*60+60)+"px";
    img.style.animationDuration=(Math.random()*4+6)+"s";
    layer.appendChild(img);
    setTimeout(()=>img.remove(),9000);
  },1800);
}

function startEmoji(){
  emojiInterval=setInterval(()=>{
    let el=document.createElement("div");
    el.className="emoji-fall";
    el.innerHTML=Math.random()>0.5?"💕":"💐";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(Math.random()*10+16)+"px";
    el.style.animationDuration=(Math.random()*3+4)+"s";
    layer.appendChild(el);
    setTimeout(()=>el.remove(),7000);
  },1200);
}

function stopEffects(){
  clearInterval(fallInterval);
  clearInterval(emojiInterval);
}

function showChoice(){
  content.innerHTML=`
  <div class="text-box">
    <p>mau gak kamu sama aku? 🥹</p>
  </div>
  <button onclick="finalYes()">Mau ❤️</button>`;
}

function finalYes(){
  stopEffects();
  document.getElementById("main").classList.add("focus-mode");

  let photo=document.getElementById("mainPhoto");
  if(photo) photo.remove();

  document.getElementById("lagu1").pause();
  document.getElementById("lagu2").play().catch(()=>{});

  setTimeout(()=>{
    content.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>
      I’ll always try my best for you 🤍<br><br>
      I love you more than you could ever imagine 💕
      </p>
    </div>

    <div style="margin-top:10px;">
      <button onclick="showMemory()">Kenangan 💖</button>
    </div>

    <img src="bouquet.png" class="bouquet">
    `;
  },1000);
}

function showMemory(){
  let i=0;

  content.innerHTML=`
  <div class="memory-wrap">
    <img id="img" class="memory-main">
  </div>
  `;

  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;

      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },300);

      setTimeout(nextImg,3000);
    }
  }

  nextImg();
}
</script>

</body>
</html>
