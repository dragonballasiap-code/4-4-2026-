<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
  transition:0.5s;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s infinite;
  position:relative;
  z-index:2;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.text-box{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:16px;
  max-width:320px;
}

button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
}

/* YES BUTTON */
.yes-btn{
  background:#ff4d6d;
  color:white;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* FOTO BACKGROUND */
.photo-fall{
  position:fixed;
  top:-100px;
  z-index:1;
  opacity:0.5;
  pointer-events:none;
  animation:fall linear;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* EMOJI */
.fall{
  position:fixed;
  top:-20px;
  z-index:5;
  animation:fall linear;
}

/* MEMORY */
.memory-main{
  width:320px;
  border-radius:16px;
  transition:opacity 0.5s;
}

/* BOUQUET */
.bouquet{
  width:220px;
  margin-top:25px;
  position:relative;
  z-index:3;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
}
.gallery img{
  width:140px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>for you 💖</h2>
  <button onclick="startApp()">Tap to Start ✨</button>
</div>

<div id="main" class="container" style="display:none;">
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const main=document.getElementById("main");
const startScreen=document.getElementById("startScreen");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0,isTyping=false;

const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"",
"and somewhere along the way...",
"I’ve fallen for you... more than I planned 💖",
"",
"aku serius sama perasaan ini",
"",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg",
"kenangan5.jpg","kenangan6.jpg","kenangan7.jpg","kenangan8.jpg",
"kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

/* START */
function startApp(){
  startScreen.style.opacity="0";

  setTimeout(()=>{
    startScreen.style.display="none";
    main.style.display="flex";

    lagu1.volume=0;
    lagu1.play().then(()=>{
      let v=0;
      let f=setInterval(()=>{
        if(v<0.6){v+=0.05; lagu1.volume=v;}
        else clearInterval(f);
      },120);
    });

    setTimeout(showIntro,1800);

  },500);
}

/* INTRO */
function showIntro(){
  main.innerHTML=`
  <div class="text-box">
    <p>
    hey... 🥹<br><br>
    aku bikin ini dengan banyak rasa...<br><br>
    are you ready to know<br>
    what this really means...? 💖
    </p>
  </div>
  <button onclick="showMade()">I'm ready 💖</button>
  `;
}

/* MADE */
function showMade(){
  main.innerHTML=`
  <div class="text-box">
    <p>
    I made this for you... 🥹<br><br>
    because there are things<br>
    I’ve been wanting to say... 💖
    </p>
  </div>
  <button onclick="startStory()">Continue 💖</button>
  `;
}

/* STORY */
function startStory(){
  step=0;
  next();
}

function typeText(t){
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;
  let inter=setInterval(()=>{
    if(i<t.length){
      el.textContent+=t[i++];
    }else clearInterval(inter);
  },35);
}

function next(){
  step++;

  main.innerHTML=`
  <div class="text-box">
    <p id="text"></p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  if(step===3){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.style.width="230px";
    img.style.borderRadius="16px";
    main.appendChild(img);
  }

  if(step===lines.length) showChoice();
}

/* CHOICE */
function showChoice(){
  main.innerHTML=`
  <div class="text-box">
    <p>jadi... mau gak kamu sama aku? 🥹</p>
  </div>
  <button class="yes-btn" onclick="yes()">Mau ❤️</button>
  <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">Tidak 😢</button>
  `;
}

function moveNo(){
  let b=document.getElementById("noBtn");
  b.style.position="fixed";
  b.style.left=Math.random()*80+"vw";
  b.style.top=Math.random()*80+"vh";
}

/* YES */
function yes(){
  main.innerHTML=`
  <div class="text-box">
    <p>
    are you really sure...? 🥹💖<br><br>
    I’m not letting you go easily 🤍
    </p>
  </div>
  <button onclick="finalYes()">Yes 💖</button>
  `;
}

/* FINAL */
function finalYes(){
  lagu1.pause();
  lagu2.play();

  startLoveRain();

  main.innerHTML=`
  <div class="text-box">
    <p>
    thank you for choosing me... 🥹💖<br><br>
    I’ll always try my best for you 🤍<br><br>
    I love you more than you could ever imagine 💕
    </p>
  </div>
  <button onclick="showMemory()">Kenangan 💖</button>
  <img src="bouquet.png" class="bouquet">
  `;
}

/* LOVE */
function startLoveRain(){
  setInterval(()=>{
    let el=document.createElement("div");
    el.className="fall";
    el.innerHTML=Math.random()>0.5?"💕":"💐";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize="20px";
    el.style.animationDuration="4s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  },300);
}

/* MEMORY */
function showMemory(){
  let i=0;
  main.innerHTML=`<img id="img" class="memory-main">`;
  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },200);
      setTimeout(nextImg,2000);
    } else showGallery();
  }
  nextImg();
}

/* GRID */
function showGallery(){
  main.innerHTML=`<h2>Kenangan Kita 💖</h2><div class="gallery"></div>`;
  let g=document.querySelector(".gallery");

  memoryPhotos.forEach(s=>{
    let im=document.createElement("img");
    im.src=s;
    g.appendChild(im);
  });
}

/* FOTO BACKGROUND */
setInterval(()=>{
  let img=document.createElement("img");
  img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
  img.className="photo-fall";
  img.style.left=Math.random()*100+"vw";
  img.style.width="60px";
  img.style.animationDuration="6s";
  document.body.appendChild(img);
  setTimeout(()=>img.remove(),7000);
},2500);
</script>

</body>
</html>
