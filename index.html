<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s infinite;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.text-box{
  background:rgba(0,0,0,0.55);
  padding:20px;
  border-radius:16px;
  max-width:320px;
}

#text{
  transition:opacity 0.3s ease;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
}

p{
  font-size:20px;
  line-height:1.8;
  font-weight:400;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}

/* FOTO JATUH */
.photo-fall{
  position:fixed;
  top:-100px;
  animation:fall linear;
  opacity:0.8;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* BOUQUET */
.bouquet{
  width:220px;
  margin-top:25px;
  animation:bouquetIn 1s ease;
}
@keyframes bouquetIn{
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;transform:scale(1);}
}

/* MEMORY */
.memory-main{
  width:240px;
  border-radius:16px;
  transition:opacity 0.5s ease;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  padding:20px;
}
.gallery img{
  width:120px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="text-box">
    <h1>Hai Nabila Bailey 💖</h1>
    <p id="text"></p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text=document.getElementById("text");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0;
let isTyping=false;

const fallingPhotos=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg"];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg","kenangan5.jpg",
"kenangan6.jpg","kenangan7.jpg","kenangan8.jpg","kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

const lines=[
"jujur... aku sempet mikir lama sebelum bikin ini 😅",
"soalnya ini bukan hal kecil buat aku...",
"",
"aku pengen nyampein ini dengan cara yang paling jujur yang aku bisa",
"",
"awalnya aku kira ini cuma perasaan biasa",
"tapi ternyata... gak sesederhana itu",
"",
"setiap kita ngobrol...",
"selalu ada sesuatu yang bikin aku nyaman 🥹",
"",
"dan entah sejak kapan...",
"kamu jadi seseorang yang sering aku pikirin",
"(entah kenapa... kamu selalu berhasil muncul di pikiranku, dan anehnya... aku gak pernah keberatan dengan itu 🥹)",
"",
"dan dari situ aku mulai sadar...",
"perasaan ini bukan sekadar biasa",
"",
"and somewhere along the way...",
"I’ve fallen for you... more than I planned 💖",
"",
"dan semakin lama...",
"aku makin yakin sama apa yang aku rasain",
"",
"and I really want to be with you",
"",
"aku gak mau maksa kamu",
"aku cuma pengen jujur sama apa yang aku rasain",
"",
"and honestly... I choose you 💖",
"",
"mau gak kamu jalanin ini sama aku? 🥹"
];

/* TYPE FIX FINAL */
function typeText(teks){
  if(teks.trim()===""){
    text.innerHTML="<br>";
    isTyping=false;
    return;
  }

  text.style.opacity=0;
  setTimeout(()=> text.style.opacity=1,100);

  text.textContent="";

  let i=0;
  isTyping=true;

  let interval=setInterval(()=>{
    if(i<teks.length){
      text.textContent+=teks[i++];
    }else{
      clearInterval(interval);
      isTyping=false;
    }
  },35);
}

function next(){
  if(isTyping) return;

  step++;

  if(step===1){
    lagu1.currentTime=25;
    lagu1.volume=0;
    lagu1.play().then(()=>{
      let vol=0;
      let fade=setInterval(()=>{
        if(vol<0.6){
          vol+=0.05;
          lagu1.volume=vol;
        } else clearInterval(fade);
      },100);
    }).catch(()=>{});
  }

  if(step<=lines.length){
    typeText(lines[step-1]);
  }

  if(step===lines.length){
    showEnding();
  }
}

/* ENDING */
function showEnding(){
  lagu1.pause();

  setTimeout(()=>{
    lagu2.volume=0.6;
    lagu2.play().catch(()=>{});
  },500);

  document.getElementById("main").innerHTML=`
  <div class="text-box">
    <h1>💖</h1>
    <p>
      thank you for reading this... 🥹<br><br>
      I really mean every single word 💖<br><br>
      I’ll always try my best for you 🤍<br><br>
      and I’m really glad… it’s you 💖
    </p>
  </div>

  <button onclick="showMemorySequence()">Lihat Kenangan 💖</button>

  <img src="bouquet.png" class="bouquet">
  `;
}

/* CINEMATIC MEMORY */
function showMemorySequence(){
  let index=0;

  document.getElementById("main").innerHTML=`
  <div class="container">
    <img id="memoryImg" class="memory-main">
    <p>Kenangan kita... 💖</p>
  </div>
  `;

  let img=document.getElementById("memoryImg");

  function nextImage(){
    if(index < memoryPhotos.length){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src=memoryPhotos[index];
        img.style.opacity=1;
      },200);

      index++;
      setTimeout(nextImage,1800);
    } else {
      setTimeout(showAllButton,2000);
    }
  }

  nextImage();
}

function showAllButton(){
  let btn=document.createElement("button");
  btn.innerHTML="Lihat Semua Kenangan 💖";
  btn.onclick=showGallery;

  document.querySelector(".container").appendChild(btn);
}

/* GRID */
function showGallery(){
  document.getElementById("main").innerHTML=`
  <h1>Kenangan Kita 💖</h1>
  <div class="gallery"></div>
  `;

  let g=document.querySelector(".gallery");

  memoryPhotos.forEach(src=>{
    let img=document.createElement("img");
    img.src=src;
    g.appendChild(img);
  });
}

/* FOTO JATUH */
setInterval(()=>{
  let img=document.createElement("img");
  img.src=fallingPhotos[Math.floor(Math.random()*fallingPhotos.length)];
  img.className="photo-fall";
  img.style.left=Math.random()*100+"vw";
  img.style.width=(Math.random()*20+60)+"px";
  img.style.animationDuration=(Math.random()*3+4)+"s";
  document.body.appendChild(img);
  setTimeout(()=>img.remove(),6000);
},2000);
</script>

</body>
</html>
