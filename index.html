<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 🌸 BACKGROUND HIDUP */
body{
  background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff4d6d,#ff8fa3);
  background-size:400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* overlay biar teks jelas */
body::after{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.25);
  pointer-events:none;
}

/* container */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* teks */
h1{
  font-size:32px;
  text-shadow:0 4px 20px rgba(0,0,0,0.6);
}

p{
  font-size:20px;
  max-width:340px;
  line-height:1.8;
  text-shadow:0 3px 15px rgba(0,0,0,0.6);
}

/* tombol */
button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  width:80%;
  max-width:280px;
}

/* foto */
img{
  width:220px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 0 25px rgba(255,255,255,0.6);
}

/* bunga jatuh */
.flower{
  position:fixed;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Hai Nabila Bailey 💖</h1>
  <p id="text"></p>
  <button id="btn" onclick="next()">Mulai 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const lagu1 = document.getElementById("lagu1");
const lagu2 = document.getElementById("lagu2");

let step = 0;

const lines = [
"jujur... aku agak bingung mulai dari mana 😅",
"soalnya ada sesuatu yang gak bisa aku anggap biasa lagi...",
"anehnya... kamu sering muncul di pikiran aku 🥹",
"dan tiap kita ngobrol, selalu ada hal kecil yang bikin aku senyum",
"jujur aja... aku gak tau ini bakal jadi apa",
"tapi aku gak mau kehilangan kesempatan buat jujur",
"dan tanpa aku sadar... aku mulai jatuh hati sama kamu 💖",
"kalau kamu ngerasa hal yang sama...",
"kamu mau gak kita coba jalanin ini pelan-pelan? 🥹"
];

/* efek ketik */
function typeText(teks){
  text.innerHTML = "";
  let i=0;
  let interval = setInterval(()=>{
    text.innerHTML += teks.charAt(i);
    i++;
    if(i>=teks.length) clearInterval(interval);
  },30);
}

function next(){
  btn.innerHTML = "Lanjut 👉";
  step++;

  if(step === 1){
    lagu1.volume = 0.5;
    lagu1.play().catch(()=>{});
  }

  if(step <= lines.length){
    typeText(lines[step-1]);
  }

  if(step === 4){
    let img = document.createElement("img");
    img.src="foto.jpg";
    document.getElementById("main").appendChild(img);
  }

  if(step === lines.length){
    btn.style.display="none";

    let yesBtn = document.createElement("button");
    yesBtn.innerHTML="Mau ❤️";
    yesBtn.onclick=yes;

    let noBtn = document.createElement("button");
    noBtn.innerHTML="Gak 😈";
    noBtn.onmouseover=()=>kabur(noBtn);

    document.getElementById("main").appendChild(yesBtn);
    document.getElementById("main").appendChild(noBtn);
  }
}

function kabur(btn){
  btn.style.position="absolute";
  btn.style.top=Math.random()*80+"%";
  btn.style.left=Math.random()*80+"%";
}

function yes(){

  // fade lagu1
  let fade=setInterval(()=>{
    if(lagu1.volume>0.05){
      lagu1.volume-=0.05;
    }else{
      clearInterval(fade);
      lagu1.pause();

      lagu2.volume=0;
      lagu2.play().catch(()=>{});

      let fadeIn=setInterval(()=>{
        if(lagu2.volume<0.6){
          lagu2.volume+=0.05;
        }else clearInterval(fadeIn);
      },200);
    }
  },200);

  document.body.innerHTML=`
  <div class="container">
    <h1>Nabila Bailey 💖</h1>
    <p>makasih udah bilang iya... 🥹❤️</p>
    <img src="bouquet.png">
    <p>
      mungkin ini sederhana...<br>
      tapi buat aku, ini berarti banyak 💖<br><br>
      dan aku pengen jalanin ini sama kamu ✨
    </p>
  </div>
  `;

  flowers();
}

/* efek bunga jatuh */
function flowers(){
  setInterval(()=>{
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="🌸";
    f.style.left=Math.random()*100+"vw";
    f.style.fontSize=(Math.random()*20+15)+"px";
    f.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),6000);
  },200);
}
</script>

</body>
</html>
