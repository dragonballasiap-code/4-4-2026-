<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
  text-align:center;
  color:white;
}

/* BACKGROUND DEEP ROMANTIC */
body{
  background: linear-gradient(-45deg, #ff4d6d, #c9184a, #a4133c, #800f2f);
  background-size:400% 400%;
  animation:bg 15s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* overlay */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  top:0;
  left:0;
}

/* glow tengah */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
}

/* container */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:2;
  position:relative;
}

/* text box */
.text-box{
  background:rgba(0,0,0,0.55);
  padding:22px;
  border-radius:18px;
  backdrop-filter: blur(6px);
  max-width:320px;
  box-shadow:0 0 30px rgba(255,255,255,0.1);
}

h1{
  font-size:30px;
  font-weight:700;
}

p{
  font-size:20px;
  line-height:1.9;
  font-weight:300;
  letter-spacing:0.3px;
}

/* button */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  width:80%;
  max-width:280px;
}

/* foto tengah */
.center-img{
  width:240px;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-30px)}
  to{opacity:1; transform:translateY(0)}
}

/* foto jatuh */
.photo-fall{
  position:fixed;
  top:-100px;
  border-radius:12px;
  opacity:0.75;
  filter: blur(0.3px);
  animation: fallPhoto linear forwards;
}

@keyframes fallPhoto{
  to{ transform: translateY(110vh) rotate(360deg); }
}

/* love */
.fall{
  position:fixed;
  top:-10px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{ transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="text-box">
    <h1>Hai Nabila Bailey 💖</h1>
    <p id="text"></p>
  </div>
  <button id="btn" onclick="next()">Mulai 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const lagu1 = document.getElementById("lagu1");
const lagu2 = document.getElementById("lagu2");

let step = 0;

const lines = [
"jujur... aku sempet mikir lama sebelum bikin ini 😅",
"soalnya ini bukan hal kecil buat aku...",
"jujur... aku juga sempet takut kalau ini malah bikin semuanya berubah 😅",
"dan mungkin kata-kata ini gak akan sesempurna yang aku rasain",
"tapi setiap kita ngobrol, selalu ada sesuatu yang bikin aku nyaman 🥹",
"hal kecil, tapi cukup buat bikin aku senyum sendiri",
"anehnya... kamu sering tiba-tiba kepikiran tanpa alasan",
"dan dari situ aku mulai sadar...",
"dan entah sejak kapan... perasaan itu berubah jadi sesuatu yang lebih dalam 💖",
"...dan mungkin ini pertama kalinya aku seberani ini untuk seseorang 🥹",
"",
"aku gak mau maksa, dan gak mau bikin kamu gak nyaman",
"aku cuma pengen jujur sama apa yang aku rasain",
"",
"jadi... kalau kamu ngerasa hal yang sama",
"kamu mau gak kita jalanin ini pelan-pelan? 🥹"
];

function typeText(teks){
  clearInterval(window.typingInterval);
  text.innerHTML="";
  let i=0;
  window.typingInterval=setInterval(()=>{
    if(i<teks.length){
      text.innerHTML+=teks[i];
      i++;
    } else clearInterval(window.typingInterval);
  },35);
}

function next(){
  btn.innerHTML="Lanjut 👉";
  step++;

  if(step===1){
    lagu1.currentTime=25;
    lagu1.volume=0.5;
    lagu1.play().catch(()=>{});
  }

  if(step<=lines.length){
    setTimeout(()=>{ typeText(lines[step-1]); },200);
  }

  if(step===5){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.className="center-img";
    document.getElementById("main").appendChild(img);
  }

  if(step===lines.length){
    btn.style.display="none";

    let yesBtn=document.createElement("button");
    yesBtn.innerHTML="Mau ❤️";
    yesBtn.onclick=yes;

    let noBtn=document.createElement("button");
    noBtn.innerHTML="Gak 😈";
    noBtn.onmouseover=()=>kabur(noBtn);

    document.getElementById("main").appendChild(yesBtn);
    document.getElementById("main").appendChild(noBtn);
  }
}

function kabur(btn){
  btn.style.position="absolute";
  btn.style.top=Math.random()*80+"%";
  btn.style.left=Math.random()*80+"%";
}

/* FOTO RAIN */
let photoInterval;
const photos=["./foto1.jpg","./foto2.jpg","./foto3.jpg","./foto4.jpg","./foto5.jpg","./foto6.jpg"];

function photoRain(){
  photoInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src=photos[Math.floor(Math.random()*photos.length)];
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.animationDuration=(Math.random()*4+4)+"s";
    img.style.width=(Math.random()*30+50)+"px";
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),8000);
  },1200);
}

/* LOVE RAIN */
function loveRain(){
  setInterval(()=>{
    let el=document.createElement("div");
    el.className="fall";
    el.innerHTML=Math.random()>0.5?"💖":"🌸";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(Math.random()*20+15)+"px";
    el.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),7000);
  },300);
}

/* YES */
function yes(){

  clearInterval(photoInterval);
  document.querySelectorAll(".photo-fall").forEach(el=>el.remove());
  loveRain();

  let fade=setInterval(()=>{
    if(lagu1.volume>0.05){
      lagu1.volume-=0.05;
    } else {
      clearInterval(fade);
      lagu1.pause();

      lagu2.currentTime=50;
      lagu2.volume=0;
      lagu2.play().catch(()=>{});

      let fadeIn=setInterval(()=>{
        if(lagu2.volume<0.6){
          lagu2.volume+=0.05;
        } else clearInterval(fadeIn);
      },150);
    }
  },150);

  setTimeout(()=>{
    document.body.innerHTML=`
    <div class="container">
      <div class="text-box">
        <h1>Nabila Bailey 💖</h1>
        <p>
          thank you for saying yes... 🥹❤️<br><br>

          honestly, I still can’t believe we’re here right now,<br>
          a moment I used to only imagine in my head 💭<br><br>

          I’m sorry I couldn’t say all of this to you directly...<br>
          but please know that I truly mean every single word 🤍<br><br>

          I might not be perfect,<br>
          but I’ll always try my best for you,<br>
          and for whatever we’re starting today 💖<br><br>

          let’s take this slowly… together ✨<br><br>

          and I’m really glad… it’s you 💖
        </p>
      </div>
      <img src="bouquet.png">
    </div>
    `;
  },600);
}

photoRain();
</script>

</body>
</html>
