<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  text-align:center;
  color:white;
}

body{
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s ease infinite;
}
@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:2;
  position:relative;
}

.text-box{
  background:rgba(0,0,0,0.55);
  padding:22px;
  border-radius:18px;
  backdrop-filter:blur(6px);
  max-width:320px;
}

h1{font-size:30px;font-weight:700;}
p{font-size:20px;line-height:1.9;font-weight:300;}

#text{transition:opacity 0.3s ease;}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  width:80%;
}

/* FOTO */
.center-img{
  width:240px;
  border-radius:18px;
  margin-top:20px;
  animation:fadeIn 1s ease;
}

.memory-container{
  display:flex;
  gap:12px;
  margin-top:15px;
  overflow:hidden;
  max-width:320px;
}

.memory-img{
  width:140px;
  border-radius:12px;
  animation:slideIn 0.5s ease;
  transition:transform 0.3s;
}
.memory-img:hover{transform:scale(1.05);}

@keyframes slideIn{
  from{transform:translateX(60px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* FOTO JATUH */
.photo-fall{
  position:fixed;
  top:-100px;
  opacity:0.7;
  animation:fall 5s linear;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="text-box">
    <h1>Hai Nabila Bailey 💖</h1>
    <p id="text"></p>
  </div>

  <div id="memoryContainer" class="memory-container"></div>

  <button id="btn" onclick="next()">Mulai 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text=document.getElementById("text");
const btn=document.getElementById("btn");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0;
let isTyping=false;

/* TEKS */
const lines=[
"jujur... aku sempet mikir lama sebelum bikin ini 😅",
"soalnya ini bukan hal kecil buat aku...",
"jujur... aku juga sempet takut kalau ini malah bikin semuanya berubah 😅",
"tapi setiap kita ngobrol selalu ada sesuatu yang bikin aku nyaman 🥹",
"hal kecil, tapi cukup buat bikin aku senyum sendiri",
"dan dari situ aku mulai sadar...",
"perasaan ini bukan sekadar biasa",
"",
"dan dari semua momen itu...",
"aku gak pernah nyangka semuanya bisa jadi seberarti ini 🥹",
"",
"aku mulai jatuh hati sama kamu 💖",
"...dan mungkin ini pertama kalinya aku seberani ini untuk seseorang 🥹",
"",
"jadi... kalau kamu ngerasa hal yang sama",
"kamu mau gak kita jalanin ini pelan-pelan? 🥹"
];

/* FOTO */
const fallingPhotos=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg"];
const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg","kenangan5.jpg",
"kenangan6.jpg","kenangan7.jpg","kenangan8.jpg","kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

function typeText(teks){
  text.style.opacity=0;
  setTimeout(()=>{text.style.opacity=1},100);

  text.innerHTML="";
  let i=0;
  isTyping=true;

  let interval=setInterval(()=>{
    if(i<teks.length){
      text.innerHTML+=teks[i++];
    }else{
      clearInterval(interval);
      setTimeout(()=>isTyping=false,300);
    }
  },35);
}

function showMemory(index){
  let img=document.createElement("img");
  img.src=memoryPhotos[index];
  img.className="memory-img";

  let c=document.getElementById("memoryContainer");
  c.appendChild(img);

  let all=c.querySelectorAll(".memory-img");
  if(all.length>3){
    all[0].style.opacity=0;
    setTimeout(()=>all[0].remove(),300);
  }
}

function next(){
  if(isTyping) return;

  step++;

  if(step===1){
    lagu1.currentTime=25;
    lagu1.volume=0.5;
    lagu1.play().catch(()=>{});
  }

  if(step<=lines.length){
    typeText(lines[step-1]);
  }

  if(step===4){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.className="center-img";
    document.getElementById("main").appendChild(img);
  }

  let memoryStart=8;
  if(step>=memoryStart && step<memoryStart+memoryPhotos.length){
    showMemory(step-memoryStart);
  }

  if(step===lines.length){
    btn.style.display="none";

    let yes=document.createElement("button");
    yes.innerHTML="Mau ❤️";
    yes.onclick=()=>location.reload();

    document.getElementById("main").appendChild(yes);
  }

  let delay=(step>=memoryStart)?2200:1500;
  if(step===lines.length-1) delay=2500;

  setTimeout(()=>isTyping=false,delay);
}

/* FOTO JATUH */
setInterval(()=>{
  let img=document.createElement("img");
  img.src=fallingPhotos[Math.floor(Math.random()*fallingPhotos.length)];
  img.className="photo-fall";
  img.style.left=Math.random()*100+"vw";
  img.style.width="50px";
  document.body.appendChild(img);
  setTimeout(()=>img.remove(),6000);
},1500);
</script>

</body>
</html>
