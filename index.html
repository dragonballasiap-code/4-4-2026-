<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  text-align:center;
  color:white;
}

body{
  background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff4d6d,#ff8fa3);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  top:0;
  left:0;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  position:relative;
  z-index:2;
}

.text-box{
  background:rgba(0,0,0,0.55);
  padding:22px;
  border-radius:18px;
  backdrop-filter: blur(6px);
  max-width:320px;
}

h1{
  font-size:30px;
}

p{
  font-size:20px;
  line-height:1.9;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  width:80%;
  max-width:280px;
}

/* foto jatuh */
.photo-fall{
  position:fixed;
  top:-100px;
  border-radius:12px;
  opacity:0.85;
  animation: fallPhoto linear forwards;
  z-index:1;
}

@keyframes fallPhoto{
  to{
    transform: translateY(110vh) rotate(360deg);
  }
}

/* love & bunga */
.fall{
  position:fixed;
  top:-10px;
  animation: fall linear forwards;
}

@keyframes fall{
  to{
    transform: translateY(100vh) rotate(360deg);
  }
}

img{
  width:220px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 0 25px rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<div class="container" id="main">

  <div class="text-box">
    <h1>Hai Nabila Bailey 💖</h1>
    <p id="text"></p>
  </div>

  <button id="btn" onclick="next()">Mulai 👉</button>

</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const lagu1 = document.getElementById("lagu1");
const lagu2 = document.getElementById("lagu2");

let step = 0;

/* 💖 TEKS UTAMA */
const lines = [
"jujur... aku sempet mikir lama sebelum bikin ini 😅",
"soalnya ini bukan hal kecil buat aku...",
"dan mungkin kata-kata ini gak akan sesempurna yang aku rasain",
"tapi setiap kita ngobrol, selalu ada sesuatu yang bikin aku nyaman 🥹",
"hal kecil, tapi cukup buat bikin aku senyum sendiri",
"anehnya... kamu sering tiba-tiba kepikiran tanpa alasan",
"dan dari situ aku mulai sadar...",
"kalau perasaan ini bukan sekadar biasa",
"aku mulai jatuh hati sama kamu 💖",
"",
"aku gak mau maksa, dan gak mau bikin kamu gak nyaman",
"aku cuma pengen jujur sama apa yang aku rasain",
"",
"jadi... kalau kamu ngerasa hal yang sama",
"kamu mau gak kita jalanin ini pelan-pelan? 🥹"
];

/* FIX TYPE TEXT */
function typeText(teks){
  clearInterval(window.typingInterval);
  text.innerHTML = "";
  let i = 0;

  window.typingInterval = setInterval(()=>{
    if(i < teks.length){
      text.innerHTML += teks[i];
      i++;
    } else {
      clearInterval(window.typingInterval);
    }
  }, 35);
}

function next(){
  btn.innerHTML="Lanjut 👉";
  step++;

  if(step===1){
    lagu1.currentTime=25;
    lagu1.volume=0.5;
    lagu1.play().catch(()=>{});
  }

  if(step<=lines.length){
    typeText(lines[step-1]);
  }

  if(step===4){
    let img=document.createElement("img");
    img.src="foto.jpg";
    document.getElementById("main").appendChild(img);
  }

  if(step===lines.length){
    btn.style.display="none";

    let yesBtn=document.createElement("button");
    yesBtn.innerHTML="Mau ❤️";
    yesBtn.onclick=yes;

    let noBtn=document.createElement("button");
    noBtn.innerHTML="Gak 😈";
    noBtn.onmouseover=()=>kabur(noBtn);

    document.getElementById("main").appendChild(yesBtn);
    document.getElementById("main").appendChild(noBtn);
  }
}

function kabur(btn){
  btn.style.position="absolute";
  btn.style.top=Math.random()*80+"%";
  btn.style.left=Math.random()*80+"%";
}

/* FOTO RAIN */
let photoInterval;

const photos = [
  "./foto1.jpg",
  "./foto2.jpg",
  "./foto3.jpg",
  "./foto4.jpg",
  "./foto5.jpg",
  "./foto6.jpg"
];

function photoRain(){
  photoInterval = setInterval(()=>{
    let img = document.createElement("img");

    let randomPhoto = photos[Math.floor(Math.random()*photos.length)];

    img.src = randomPhoto;
    img.className="photo-fall";

    img.style.left=Math.random()*100+"vw";
    img.style.animationDuration=(Math.random()*4+4)+"s";
    img.style.width=(Math.random()*40+60)+"px";

    document.body.appendChild(img);
    setTimeout(()=>img.remove(),8000);

  },1000);
}

/* LOVE RAIN */
function loveRain(){
  setInterval(()=>{
    let el=document.createElement("div");

    el.className="fall";
    el.innerHTML=Math.random()>0.5?"💖":"🌸";

    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(Math.random()*20+15)+"px";
    el.style.animationDuration=(Math.random()*4+3)+"s";

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),7000);

  },300);
}

/* YES */
function yes(){

  clearInterval(photoInterval);
  document.querySelectorAll(".photo-fall").forEach(el=>el.remove());

  loveRain();

  let fade=setInterval(()=>{
    if(lagu1.volume>0.05){
      lagu1.volume-=0.05;
    }else{
      clearInterval(fade);
      lagu1.pause();

      lagu2.currentTime=50;
      lagu2.volume=0;
      lagu2.play().catch(()=>{});

      let fadeIn=setInterval(()=>{
        if(lagu2.volume<0.6){
          lagu2.volume+=0.05;
        }else clearInterval(fadeIn);
      },200);
    }
  },200);

  document.body.innerHTML=`
  <div class="container">
    <div class="text-box">
      <h1>Nabila Bailey 💖</h1>
      <p>
        makasih ya... udah bilang iya 🥹❤️<br><br>

        jujur, aku gak nyangka bakal sampai di momen ini...<br>
        momen yang dari awal cuma ada di pikiran aku aja<br><br>

        mungkin semua ini sederhana,<br>
        tapi buat aku... ini berarti banget 💖<br><br>

        aku gak janji semuanya bakal selalu sempurna,<br>
        tapi aku janji akan selalu berusaha buat jaga kamu,<br>
        dan jaga apa yang kita mulai hari ini 🤍<br><br>

        pelan-pelan aja ya... kita jalanin bareng ✨
      </p>
    </div>
    <img src="bouquet.png">
  </div>
  `;
}

/* START */
photoRain();

</script>

</body>
</html>
