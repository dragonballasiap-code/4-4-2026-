<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  overflow:hidden;

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  animation: fade 1s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h1 { font-size:28px; }

p {
  font-size:20px;
  max-width:350px;
  line-height:1.8;
}

button {
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
}

img {
  width:220px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

.heart {
  position:fixed;
  color:pink;
  animation: float 5s linear infinite;
}

@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1 id="title">Hai Nabila Bailey 💖</h1>
  <p id="text"></p>

  <button onclick="next()">Mulai 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text = document.getElementById("text");
const lagu1 = document.getElementById("lagu1");
const lagu2 = document.getElementById("lagu2");

let step = 0;

function next(){
  step++;

  if(step === 1){
    lagu1.volume = 0.5;
    lagu1.play().catch(()=>{});
    text.innerHTML = "jujur... aku agak bingung mulai dari mana 😅";
  }

  else if(step === 2){
    text.innerHTML = "soalnya ada sesuatu yang gak bisa aku anggap biasa lagi...";
  }

  else if(step === 3){
    text.innerHTML = "anehnya... kamu sering muncul di pikiran aku 🥹";
  }

  else if(step === 4){
    text.innerHTML = "dan tiap kita ngobrol, selalu ada hal kecil yang bikin aku senyum";
    let img = document.createElement("img");
    img.src = "foto.jpg";
    document.getElementById("main").appendChild(img);
  }

  else if(step === 5){
    text.innerHTML = "jujur aja... aku gak tau ini bakal jadi apa";
  }

  else if(step === 6){
    text.innerHTML = "tapi aku juga gak mau kehilangan kesempatan buat jujur";
  }

  else if(step === 7){
    text.innerHTML = "dan tanpa aku sadar... aku mulai jatuh hati sama kamu 💖";
  }

  else if(step === 8){
    text.innerHTML = "kalau kamu ngerasa hal yang sama...";
  }

  else if(step === 9){
    text.innerHTML = "kamu mau gak kita coba jalanin ini pelan-pelan? 🥹";

    let yesBtn = document.createElement("button");
    yesBtn.innerHTML = "Mau ❤️";
    yesBtn.onclick = yes;

    let noBtn = document.createElement("button");
    noBtn.innerHTML = "Gak 😈";
    noBtn.onmouseover = () => kabur(noBtn);

    document.getElementById("main").appendChild(yesBtn);
    document.getElementById("main").appendChild(noBtn);
  }
}

function kabur(btn){
  btn.style.position = "absolute";
  btn.style.top = Math.random()*80 + "%";
  btn.style.left = Math.random()*80 + "%";
}

function yes(){

  // fade lagu1
  let fade = setInterval(()=>{
    if(lagu1.volume > 0.05){
      lagu1.volume -= 0.05;
    } else {
      clearInterval(fade);
      lagu1.pause();

      lagu2.volume = 0;
      lagu2.play().catch(()=>{});

      let fadeIn = setInterval(()=>{
        if(lagu2.volume < 0.5){
          lagu2.volume += 0.05;
        } else clearInterval(fadeIn);
      },200);
    }
  },200);

  document.body.innerHTML = `
  <div class="container">
    <h1>Nabila Bailey 💖</h1>
    <p>makasih udah bilang iya... 🥹❤️</p>
    <img src="bouquet.png">
    <p>
      mungkin ini sederhana...<br>
      tapi buat aku, ini berarti banyak 💖<br><br>
      dan aku pengen jalanin ini sama kamu ✨
    </p>
  </div>
  `;

  fireworks();
}

// efek hati
function fireworks(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}
</script>

</body>
</html>
