<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;color:white;overflow:hidden}

/* INTRO */
#intro{position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:999}

/* BG */
#bg-layer{
position:fixed;inset:0;z-index:0;
background:linear-gradient(-45deg,#ff4d6d,#c9184a,#ff758f,#ff8fa3);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}
#bg-layer::after{
content:"";position:absolute;inset:0;
background:radial-gradient(circle, rgba(255,182,193,0.15), rgba(0,0,0,0.7));
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* LAYERS */
#falling-layer,#emoji-layer{position:fixed;inset:0;pointer-events:none}
#falling-layer{z-index:1}
#emoji-layer{z-index:2}

.container{
position:relative;z-index:3;
min-height:100vh;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
padding:20px;
}

/* TEXT */
.text-box{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
padding:20px;border-radius:18px;width:90%;
line-height:1.7;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation:fadeText 0.6s ease;
max-height:65vh;
overflow-y:auto;
}
@keyframes fadeText{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
.header-name{font-family:'Playfair Display';font-size:17px}

/* BUTTON */
button{
padding:12px 18px;border:none;border-radius:25px;
background:linear-gradient(135deg,#ff8fa3,#ff4d6d);
color:white;font-weight:bold;margin-top:12px;
}
#noBtn:hover{transform:translateX(10px) scale(0.95);opacity:0.7}

/* PHOTO */
#photo-slot{display:flex;justify-content:center;margin:12px 0}
.main-photo{
width:70%;max-width:260px;border-radius:16px;
opacity:0;transform:translateY(20px);
transition:1s ease;
}

/* FALL */
.photo-fall{position:absolute;top:-100px;animation:fall linear;opacity:0.3}
.emoji-fall{position:absolute;top:-30px;animation:fall linear;opacity:0.6}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

/* BOUQUET */
.bouquet{
position:fixed;
right:10px;
bottom:0;
width:30%;
max-width:180px;
opacity:0.85;
transform:translateY(60px) scale(0.9);
animation:bouquetIn 1s ease forwards,floatSoft 5s ease-in-out infinite;
z-index:2;
}
@keyframes bouquetIn{to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes floatSoft{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* POPUP */
#lovePopup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.8);
font-size:26px;
background:rgba(0,0,0,0.6);
padding:16px 24px;
border-radius:20px;
opacity:0;
z-index:10;
animation:popLove 1s ease forwards;
}
@keyframes popLove{
to{opacity:1;transform:translate(-50%,-50%) scale(1);}
}

/* MEMORY */
.memory-wrap{display:flex;justify-content:center;align-items:center;height:80vh}
.memory-main{width:90%;border-radius:16px;opacity:0;transition:0.8s}
</style>
</head>

<body>

<div id="intro">
<h2>hey... 🥹</h2>
<button onclick="startApp()">tap slowly 💖</button>
</div>

<div id="bg-layer"></div>
<div id="falling-layer"></div>
<div id="emoji-layer"></div>

<div id="main" class="container" style="display:none;">
<div id="content"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const fallingLayer=document.getElementById("falling-layer");
const emojiLayer=document.getElementById("emoji-layer");

let index=0,check,started=false,fallInterval;

/* INTRO */
const introLines=[
"before this starts...",
"read it slowly... okay? 🤍",
"",
"I made this for you"
];

/* TIMELINE */
const timeline=[
{time:1.5,text:"hey... can you stay for a moment? 🥹"},
{time:5,text:"aku bikin ini bukan karena iseng..."},
{time:9,text:"but because there’s something I really want you to know"},
{time:14,text:"aku nyaman banget ngobrol sama kamu"},
{time:19,text:"and somehow... you stay in my mind 😌"},
{time:24,text:"aneh ya..."},
{time:27,text:"you kinda live in my head rent free 😏"},
{time:32,text:"so yeah..."},
{time:36.5,text:"I like you 💖"},
{time:40,text:"not just dikit..."},
{time:43,text:"but in a way I actually care about you 🥹"}
];

function startApp(){
if(started)return;
started=true;
intro.style.display="none";
main.style.display="flex";
lagu1.play().catch(()=>{});
setTimeout(showIntroText,800);
}

function showIntroText(){
let i=0;

content.innerHTML=`
<div class="text-box"><p id="introText"></p></div>
<div id="photo-slot"></div>
`;

let el=document.getElementById("introText");
let slot=document.getElementById("photo-slot");

function nextLine(){
if(i<introLines.length){

el.innerHTML+=introLines[i]+"<br>";

if(i===introLines.length-1){
let img=document.createElement("img");
img.src="foto.jpg";
img.id="mainPhoto";
img.className="main-photo";
slot.appendChild(img);

setTimeout(()=>{
img.style.opacity=1;
img.style.transform="translateY(0)";
},300);
}

i++;
setTimeout(nextLine,1400);
}else{
setTimeout(startStory,1600);
}
}
nextLine();
}

/* SYNC */
let displayOffset=400;
let minGap=2700;
let lastShown=0;

function startStory(){
startFalling();
syncStory();
}

function syncStory(){
check=setInterval(()=>{
let current=lagu1.currentTime;
let now=Date.now();

if(index<timeline.length && current>=timeline[index].time){
if(now-lastShown>=minGap){
setTimeout(()=>{
showLine(timeline[index].text);
},displayOffset);
lastShown=now;
index++;
}
}

if(index>=timeline.length){
clearInterval(check);
setTimeout(showChoice,3200);
}
},200);
}

function showLine(text){
content.innerHTML=`
<div class="text-box">
<div class="header-name">Hai Nabila Bailey 💕</div>
<p>${text}</p>
</div>
<div id="photo-slot"></div>
`;
attachPhoto();
}

function attachPhoto(){
let photo=document.getElementById("mainPhoto");
let slot=document.getElementById("photo-slot");
if(photo&&slot)slot.appendChild(photo);
}

/* FALL */
function startFalling(){
fallInterval=setInterval(()=>{
let img=document.createElement("img");
img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
img.className="photo-fall";
img.style.left=Math.random()*100+"vw";
img.style.width=(Math.random()*60+60)+"px";
img.style.animationDuration=(Math.random()*4+6)+"s";
fallingLayer.appendChild(img);
setTimeout(()=>img.remove(),9000);
},2500);
}

function stopFalling(){
clearInterval(fallInterval);
fallingLayer.innerHTML="";
}

/* EMOJI */
function startEmoji(){
setInterval(()=>{
let el=document.createElement("div");
el.className="emoji-fall";
el.innerHTML=Math.random()>0.5?"💕":"💐";
el.style.left=Math.random()*100+"vw";
el.style.fontSize=(Math.random()*12+16)+"px";
el.style.animationDuration=(Math.random()*3+4)+"s";
emojiLayer.appendChild(el);
setTimeout(()=>el.remove(),7000);
},1500);
}

/* CHOICE */
function showChoice(){
content.innerHTML=`
<div class="text-box">
<p>you feel it too, don’t you? 😏💖</p>
</div>
<div style="display:flex;gap:12px;">
<button onclick="confirmYes()">Yes 💖</button>
<button onclick="confirmNo()" id="noBtn">Hmm... 😌</button>
</div>
`;
attachPhoto();
}

function confirmYes(){
content.innerHTML=`
<div class="text-box">
<p>are you really sure...? 🥹<br><br>I’m not planning to let you go easily 😏💖</p>
</div>
<button onclick="finalYes()">Yes, I’m sure 💕</button>
<button onclick="showChoice()">Wait...</button>
`;
attachPhoto();
}

function confirmNo(){
content.innerHTML=`
<div class="text-box">
<p>hmm... I don’t think that’s your real answer 😌<br><br>try again... I’ll wait 🥹💖</p>
</div>
<button onclick="confirmYes()">Okay... yes 😳</button>
`;
attachPhoto();
}

/* BOUQUET */
function showBouquet(){
let img=document.createElement("img");
img.src="bouquet.png";
img.className="bouquet";
document.body.appendChild(img);
}

/* POPUP */
function showLoveSequence(){
const texts=[
"Love you 💕💕💕",
"Love you more 💐💖💕",
"Love you more than you expect 🤍💖"
];

let i=0;

function next(){
if(i>=texts.length){
let last=document.getElementById("lovePopup");
if(last){
last.style.transition="0.6s";
last.style.opacity=0;
setTimeout(()=>last.remove(),600);
}
return;
}

let old=document.getElementById("lovePopup");
if(old) old.remove();

let popup=document.createElement("div");
popup.id="lovePopup";
popup.innerHTML=texts[i];
document.body.appendChild(popup);

i++;
setTimeout(next,2000);
}
next();
}

/* ENDING */
function finalYes(){
stopFalling();
startEmoji();

let photo=document.getElementById("mainPhoto");
if(photo)photo.remove();

lagu1.pause();

setTimeout(()=>{
lagu2.play().catch(()=>{});
},1200);

content.innerHTML=`<div class="text-box"><p>...</p></div>`;

setTimeout(()=>{
content.innerHTML=`
<div class="text-box">
<p>
so... you really said yes 😏💖<br><br>
jujur, I had a feeling you would...<br>
but this means a lot to me 🤍<br><br>
aku gak butuh yang sempurna,<br>
aku cuma butuh yang nyata... dan itu kamu 🥹<br><br>
I’ll be there, not only when it’s easy,<br>
but also when it’s not 💖<br><br>
because you’re not just someone I like...<br>
you’re someone I choose 🤍<br><br>
so stay with me, okay? 😌💕<br><br>
and yeah... I’m really glad it’s you 🤍
</p>
</div>

<button onclick="showMemory()">Kenangan 💖</button>
`;

let text=content.innerText;
let words=text.split(" ").length;
let readingTime=(words/200)*60*1000;

let delay=readingTime+1200;

setTimeout(()=>{
showBouquet();
showLoveSequence();
},delay);

},1500);
}

/* MEMORY */
function showMemory(){
let i=0;
content.innerHTML=`
<div class="memory-wrap">
<img id="img" class="memory-main">
</div>
`;

let img=document.getElementById("img");

function nextImg(){
if(i<11){
img.style.opacity=0;
setTimeout(()=>{
img.src="kenangan"+(i+1)+".jpg";
img.style.opacity=1;
i++;
},300);
setTimeout(nextImg,3000);
}
}
nextImg();
}
</script>

</body>
</html>
